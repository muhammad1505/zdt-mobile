name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project (Prebuild)
        run: npx expo prebuild -p android --no-install

      - name: Setup Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          # Inject release signing config into build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle
          cat << 'EOF' > android/app/signing.gradle
          android {
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword System.getenv('ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD')
                      keyAlias System.getenv('ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS')
                      keyPassword System.getenv('ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD')
                  }
              }
          }
          EOF
          echo "apply from: 'signing.gradle'" >> android/app/build.gradle

      - name: Build Android Release APK
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.RELEASE_KEYSTORE_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ZDT Mobile Latest Build"
          tag_name: "v${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
