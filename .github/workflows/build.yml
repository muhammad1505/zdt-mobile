name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project (Prebuild)
        run: npx expo prebuild -p android --no-install

      - name: Setup Keystore
        run: |
          cat release.keystore.base64 | base64 --decode > android/app/debug.keystore
          # Patch the default debug signing config to use our release secrets
          sed -i "s/storePassword 'android'/storePassword System.getenv('ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD')/g" android/app/build.gradle
          sed -i "s/keyAlias 'androiddebugkey'/keyAlias System.getenv('ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS')/g" android/app/build.gradle
          sed -i "s/keyPassword 'android'/keyPassword System.getenv('ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD')/g" android/app/build.gradle

      - name: Build Android Release APK
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: zdtmobile123
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: zdt-mobile-key
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: zdtmobile123
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: "${{ github.ref_name }}"
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
